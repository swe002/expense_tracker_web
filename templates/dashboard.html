<!DOCTYPE html>
<html>
<head>
    <title>Expense Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Poppins;
    margin:0;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    background:rgba(0,0,0,0.3);
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:white;
}

/* CONTAINER */
.container{
    width:90%;
    margin:auto;
}

/* CARD */
.card{
    background:white;
    color:black;
    padding:20px;
    margin-top:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* FORM */
input,button{
    padding:10px;
    margin:5px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#5a67d8;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th{
    background:#667eea;
    color:white;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.total-box{
    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
    <h2>💰 Expense Tracker Dashboard</h2>
    <div>
        <img class="avatar" src="https://i.pravatar.cc/40">
        <a href="/logout" style="color:white;margin-left:15px;">Logout</a>
    </div>
</div>

<div class="container">

<!-- TOTAL -->
<div class="card total-box">
    Total Expense: ₹ {{ total }}
</div>

<!-- ADD EXPENSE -->
<div class="card">
<h3>Add Expense</h3>

<form method="POST" action="/add">

<input type="text" name="title" placeholder="Title" required>
<input type="number" step="0.01" name="amount" placeholder="Amount" required>
<input type="text" name="category" placeholder="Category" required>
<input type="text" name="description" placeholder="Description" required>
<input type="date" name="date" required>

<button type="submit">Add</button>

</form>
</div>

<!-- TABLE -->
<div class="card">
<h3>Expense History</h3>

<table>
<tr>
<th>ID</th>
<th>Title</th>
<th>Amount</th>
<th>Category</th>
<th>Description</th>
<th>Date</th>
<th>Action</th>
</tr>

{% for e in expenses %}
<tr>
<td>{{ e[0] }}</td>
<td>{{ e[1] }}</td>
<td>₹ {{ e[2] }}</td>
<td>{{ e[3] }}</td>
<td>{{ e[4] }}</td>
<td>{{ e[5] }}</td>
<td>{{ e.id }}</td>
<td>
<a href="/delete/{{e[0]}}">❌</a>
</td>
</tr>
{% endfor %}

</table>
</div>

<!-- CHARTS -->
<div class="grid">

<div class="card">
<h3>Category Chart</h3>
<canvas id="pieChart"></canvas>
</div>

<div class="card">
<h3>Monthly Expenses</h3>
<canvas id="barChart"></canvas>
</div>

</div>

</div>

<script>

/* CATEGORY DATA */
const categoryData = {{ category_data | tojson | safe }};
const catLabels = categoryData.map(x=>x.category);
const catAmounts = categoryData.map(x=>x.total);

/* PIE CHART */
new Chart(document.getElementById("pieChart"),{
    type:"pie",
    data:{
        labels:catLabels,
        datasets:[{data:catAmounts}]
    }
});


/* MONTH DATA */
const monthlyData = {{ monthly_data | tojson | safe }};
const months = monthlyData.map(x=>x.month);
const amounts = monthlyData.map(x=>x.total);

/* BAR CHART */
new Chart(document.getElementById("barChart"),{
    type:"bar",
    data:{
        labels:months,
        datasets:[{label:"Expenses",data:amounts}]
    }
});

</script>

</body>
</html>
